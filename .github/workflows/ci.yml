name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Build runtime
        shell: pwsh
        run: .\scripts\build.ps1

      - name: Build artifact checks
        shell: pwsh
        run: |
          if (-not (Test-Path ".build/bin/meccha-camouflage.exe")) { throw "runtime exe missing" }
          if (-not (Test-Path ".build/bin/runtime-bridge.dll")) { throw "bridge dll missing" }

      - name: Package dry run
        shell: pwsh
        run: |
          $version = "ci-$env:GITHUB_RUN_NUMBER"
          .\scripts\release.ps1 -Version $version
          $zipPath = ".build/package/meccha-camouflage-$version.zip"
          if (-not (Test-Path $zipPath)) { throw "package zip missing" }
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $zip = [System.IO.Compression.ZipFile]::OpenRead((Resolve-Path $zipPath))
          try {
            $profile = $zip.Entries | Where-Object { $_.FullName -eq "mesh-profiles/paintman.mesh-profile-v2.json" } | Select-Object -First 1
            if (-not $profile) { throw "mesh profile missing from package" }
          } finally {
            $zip.Dispose()
          }
